name: Test telegram-minions

on:
  pull_request:
    paths:
      - "telegram-minions/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-minions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: telegram-minions/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test
